<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日投資檢查</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3498db;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 p-6 min-h-screen">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-gray-900 flex items-center">
            📊 每日投資檢查
            <button onclick="loadData()" class="ml-4 text-sm bg-blue-600 hover:bg-blue-700 text-white py-1 px-3 rounded shadow transition">重新整理</button>
            <button onclick="openSettings()" class="ml-2 text-sm bg-gray-600 hover:bg-gray-700 text-white py-1 px-3 rounded shadow transition">⚙ 管理標的</button>
        </h1>
        
        <div class="bg-white rounded-lg shadow overflow-hidden overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200 text-sm whitespace-nowrap">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">類別</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">標的名稱</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">代號</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">股價</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">K值</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">KD狀態</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">位置判斷</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">操作建議</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">備註</th>
                        <th class="px-4 py-3 text-left font-medium text-gray-600">更新時間</th>
                    </tr>
                </thead>
                <tbody id="dataTable" class="divide-y divide-gray-200">
                    <!-- 載入中動畫 -->
                    <tr id="loadingRow">
                        <td colspan="10" class="px-6 py-10 text-center text-gray-500">
                            <div class="flex flex-col items-center justify-center">
                                <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-3"></div>
                                <p>正在自 Yahoo 股市獲取最新數據並計算 KD 值...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="mt-4 text-xs text-gray-400">
            * 數據來源：Yahoo Finance 歷史報價 API。KD 預設採 9 日計算參數。
        </div>
    </div>

    <!-- ======================================================
         設定 Modal
    ======================================================= -->
    <div id="settingsModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-50" style="display:none">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl mx-4 flex flex-col" style="max-height:90vh">

            <!-- Modal 標題列 -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 shrink-0">
                <h2 class="text-lg font-bold text-gray-900">⚙ 管理股票標的</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-700 text-3xl leading-none pb-1">&times;</button>
            </div>

            <!-- 標的清單 -->
            <div class="overflow-y-auto px-6 py-2" style="flex:1">
                <div id="settingsList" class="divide-y divide-gray-100"></div>
            </div>

            <!-- 新增 / 編輯表單 -->
            <div class="px-6 py-4 border-t border-gray-200 bg-gray-50 shrink-0">
                <p id="formTitle" class="text-sm font-semibold text-gray-700 mb-3">新增股票標的</p>
                <div class="flex flex-wrap gap-2 items-end">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-500">代號</label>
                        <input id="inputSymbol" type="text" placeholder="如 0050 或 ^TWII"
                            class="border border-gray-300 rounded px-3 py-1.5 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-500">名稱</label>
                        <input id="inputName" type="text" placeholder="如 元大台灣50"
                            class="border border-gray-300 rounded px-3 py-1.5 text-sm w-36 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-gray-500">類別</label>
                        <select id="inputCategory"
                            class="border border-gray-300 rounded px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="台灣市值型 ETF">台灣市值型 ETF</option>
                            <option value="國際市值型 ETF">國際市值型 ETF</option>
                            <option value="美債券 ETF">美債券 ETF</option>
                            <option value="短線操作（個股）">短線操作（個股）</option>
                        </select>
                    </div>
                    <button id="submitBtn" onclick="submitTargetForm()"
                        class="bg-blue-600 hover:bg-blue-700 text-white text-sm py-1.5 px-4 rounded transition">新增</button>
                    <button id="cancelEditBtn" onclick="cancelEdit()"
                        class="bg-gray-300 hover:bg-gray-400 text-gray-700 text-sm py-1.5 px-4 rounded transition" style="display:none">取消</button>
                </div>
                <p id="formError" class="text-xs text-red-500 mt-2" style="display:none"></p>
            </div>

            <!-- 底部：備份 + 儲存關閉 -->
            <div class="flex items-center justify-between px-6 py-4 border-t border-gray-200 shrink-0">
                <div class="flex gap-2">
                    <button onclick="exportTargets()"
                        class="text-sm bg-green-600 hover:bg-green-700 text-white py-1.5 px-4 rounded shadow transition">⬇ 匯出備份</button>
                    <label class="text-sm bg-yellow-500 hover:bg-yellow-600 text-white py-1.5 px-4 rounded shadow transition cursor-pointer">
                        ⬆ 匯入備份
                        <input id="importFileInput" type="file" accept=".json" class="hidden" onchange="importTargets(event)" />
                    </label>
                </div>
                <button onclick="saveSettings()"
                    class="text-sm bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded shadow transition font-semibold">儲存並關閉</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 預設標的 + localStorage 讀寫
        // ============================================================
        const DEFAULT_TARGETS = [
            { category: '台灣市值型 ETF', name: '台灣大盤(加權指數)', symbol: '^TWII', apiSymbol: '^TWII', step: 1 },
            { category: '國際市值型 ETF', name: '元大 S&P500', symbol: '00646', apiSymbol: '00646.TW', step: 2 },
            { category: '國際市值型 ETF', name: '富邦歐洲', symbol: '00709', apiSymbol: '00709.TW', step: 2 },
            { category: '國際市值型 ETF', name: '元大日經', symbol: '00661', apiSymbol: '00661.TW', step: 2 },
            { category: '國際市值型 ETF', name: '國泰新興市場', symbol: '00736', apiSymbol: '00736.TW', step: 2 },
            { category: '美債券 ETF', name: '元大美債1-3年', symbol: '00719B', apiSymbol: '00719B.TWO', step: 3 },
            { category: '美債券 ETF', name: '國泰US短期公債', symbol: '00865B', apiSymbol: '00865B.TW', step: 3 },
            { category: '短線操作（個股）', name: '台積電', symbol: '2330', apiSymbol: '2330.TW', step: 4 },
            { category: '短線操作（個股）', name: '鴻海', symbol: '2317', apiSymbol: '2317.TW', step: 4 },
            { category: '短線操作（個股）', name: '廣達', symbol: '2382', apiSymbol: '2382.TW', step: 4 },
            { category: '短線操作（個股）', name: '緯創', symbol: '3231', apiSymbol: '3231.TW', step: 4 },
            { category: '短線操作（個股）', name: '茂順', symbol: '9942', apiSymbol: '9942.TW', step: 4 },
        ];

        const STORAGE_KEY = 'stockTargets';

        function loadTargets() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) return JSON.parse(saved);
            } catch (e) {
                console.warn('讀取 localStorage 失敗，使用預設標的', e);
            }
            return JSON.parse(JSON.stringify(DEFAULT_TARGETS));
        }

        function saveTargets() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(targets));
        }

        let targets = loadTargets();

        // KD 計算函數 (9日)
        function calculateKD(highs, lows, closes, period = 9) {
            let k = 50, d = 50;
            let result = [];

            for (let i = 0; i < closes.length; i++) {
                if (i < period - 1 || closes[i] === null) {
                    result.push({ k: 50, d: 50 });
                    continue;
                }

                let currentHighs = highs.slice(i - period + 1, i + 1).filter(v => v !== null);
                let currentLows = lows.slice(i - period + 1, i + 1).filter(v => v !== null);
                
                if (currentHighs.length === 0 || currentLows.length === 0) {
                    result.push({ k: k, d: d });
                    continue;
                }

                let hh = Math.max(...currentHighs);
                let ll = Math.min(...currentLows);
                let close = closes[i];

                let rsv = (hh === ll) ? k : ((close - ll) / (hh - ll)) * 100;
                k = (2 / 3) * k + (1 / 3) * rsv;
                d = (2 / 3) * d + (1 / 3) * k;

                result.push({ k: k, d: d });
            }
            return result;
        }

        // 判斷邏輯
        function analyzeData(step, k, kdCross) {
            let location = '中性';
            if (k < 20) location = '低點';
            if (k > 80) location = '高點';

            let advice = '觀望';
            
            switch(step) {
                case 1:
                    if (k < 20) advice = '買進台灣市值型 ETF';
                    else if (k > 80) advice = '賣出台灣市值型 ETF';
                    break;
                case 2:
                case 3:
                    if (k < 20) advice = '可買進';
                    else if (k > 80) advice = '可賣出';
                    break;
                case 4:
                    if (k < 20) {
                        advice = kdCross === '黃金交叉' ? '全買' : '部分買進(1/2資金)';
                    } else if (k > 80) {
                        advice = kdCross === '死亡交叉' ? '全賣' : '部分賣出(1/2股票)';
                    }
                    break;
            }

            return { location, advice };
        }

        // 記憶當前穩定運作的代理伺服器索引
        let currentProxyIndex = 0;

        async function fetchYahooData(symbol) {
            // 【關鍵修正】: 改用「5分鐘級別」的快取鍵，取代原本毫秒級的隨機字串。
            // 這樣免費代理伺服器就可以利用快取來回應，不再因為頻繁穿透請求而被 Yahoo 徹底封鎖 IP。
            const cacheKey = Math.floor(new Date().getTime() / 300000); 
            
            const endpoints = [
                `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo&_=${cacheKey}`,
                `https://query2.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=3mo&_=${cacheKey}`
            ];
            
            // 代理伺服器清單
            const proxyGenerators = [
                { id: 'allorigins_get', build: (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}` },
                { id: 'allorigins_raw', build: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
                { id: 'codetabs', build: (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}` },
                { id: 'corsproxy_io', build: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` }
            ];

            let lastError;
            
            for (let endpoint of endpoints) {
                for (let attempt = 0; attempt < proxyGenerators.length; attempt++) {
                    // 確保優先使用上次成功運作的代理器 (Sticky Proxy 機制)
                    let proxyIndex = (currentProxyIndex + attempt) % proxyGenerators.length;
                    let proxy = proxyGenerators[proxyIndex];
                    let proxyUrl = proxy.build(endpoint);
                    
                    try {
                        const controller = new AbortController();
                        // 【關鍵修正】: 將連線超時從 12 秒延長至 18 秒，以容忍免費代理伺服器的冷啟動延遲。
                        const timeoutId = setTimeout(() => controller.abort(), 18000);
                        
                        let response;
                        try {
                            response = await fetch(proxyUrl, { 
                                signal: controller.signal,
                                headers: { 'Accept': 'application/json' },
                                cache: 'no-store' // 確保瀏覽器不快取，交由代理伺服器本身處理快取
                            });
                        } catch (fetchErr) {
                            // 捕捉 Failed to fetch (瀏覽器拒絕連線或 DNS 失敗)
                            throw new Error(`NETWORK_ERROR (${fetchErr.name || fetchErr.message})`);
                        } finally {
                            clearTimeout(timeoutId);
                        }
                        
                        if (response.status === 404) throw new Error("NOT_FOUND");
                        
                        let text = await response.text();
                        
                        // 針對 allorigins /get 的特例解析，安全提取 contents
                        if (proxy.id === 'allorigins_get') {
                            let jsonWrap;
                            try { 
                                jsonWrap = JSON.parse(text); 
                            } catch (e) { 
                                throw new Error("INVALID_PROXY_JSON"); 
                            }
                            if (jsonWrap.status && jsonWrap.status.http_code === 404) throw new Error("NOT_FOUND");
                            text = jsonWrap.contents || "";
                        }
                        
                        // 過濾各種非預期的純文字錯誤或是 HTML (代表被阻擋或 Rate Limit)
                        if (!text || text.trim().startsWith('<') || text.includes('Too Many Requests') || text.startsWith('Edge:')) {
                            throw new Error("PROXY_BLOCKED_OR_RATE_LIMIT");
                        }
                        
                        let data;
                        try {
                            data = JSON.parse(text);
                        } catch (e) {
                            throw new Error("INVALID_YAHOO_JSON");
                        }
                        
                        if (data && data.chart && data.chart.result) {
                            // 成功！將此代理設為首選，下次直接從它開始
                            currentProxyIndex = proxyIndex;
                            return data;
                        } else {
                            throw new Error("INVALID_YAHOO_FORMAT");
                        }
                    } catch (e) {
                        lastError = e;
                        console.warn(`[嘗試 ${proxy.id} 失敗]: ${e.message}`);
                        
                        if (e.message === "NOT_FOUND") {
                            throw e; // 標的真的不存在，直接拋出不浪費時間嘗試其他代理
                        }
                        
                        // 失敗後稍等 1.5 秒再試下一個代理，避免瞬間發出過多錯誤請求
                        await new Promise(resolve => setTimeout(resolve, 1500));
                    }
                }
            }
            throw lastError || new Error("All endpoints and proxies failed");
        }

        async function fetchStockData(item) {
            try {
                let parsed;
                try {
                    parsed = await fetchYahooData(item.apiSymbol);
                } catch (error) {
                    if (error.message === "NOT_FOUND" && item.apiSymbol.includes('.TWO')) {
                        parsed = await fetchYahooData(`${item.symbol}.TW`);
                    } else {
                        throw error;
                    }
                }

                const result = parsed.chart.result[0];
                const quotes = result.indicators.quote[0];
                
                // 取得最新股價
                const validCloses = quotes.close.filter(v => v !== null);
                const currentPrice = validCloses.length > 0 ? validCloses[validCloses.length - 1] : 'N/A';
                const formattedPrice = currentPrice !== 'N/A' ? currentPrice.toLocaleString('en-US', {maximumFractionDigits: 2}) : 'N/A';

                const kdData = calculateKD(quotes.high, quotes.low, quotes.close);
                const last = kdData[kdData.length - 1];
                const prev = kdData[kdData.length - 2];

                let kVal = last.k;
                let kdCross = '無';
                let remark = '';
                
                if (item.step !== 1) { 
                    // 近似判斷法邏輯
                    if (prev) {
                        const kUp = last.k > prev.k;
                        const kDown = last.k < prev.k;
                        const dDownOrFlat = last.d <= prev.d;
                        const dUpOrFlat = last.d >= prev.d;

                        if (last.k > last.d && kUp && dDownOrFlat) {
                            kdCross = '黃金交叉';
                        } else if (last.k < last.d && kDown && dUpOrFlat) {
                            kdCross = '死亡交叉';
                        }
                    }
                    remark = 'KD狀態採近似判斷';
                } else {
                    kdCross = '—';
                }

                const analysis = analyzeData(item.step, kVal, kdCross);
                
                // 取得目前時間戳
                const now = new Date();
                const updateTime = now.toLocaleString('zh-TW', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                return {
                    ...item,
                    price: formattedPrice,
                    kVal: kVal.toFixed(2),
                    kdCross: kdCross,
                    location: analysis.location,
                    advice: analysis.advice,
                    remark: remark,
                    updateTime: updateTime,
                    status: 'success'
                };
            } catch (error) {
                // 將 console.error 改為 console.warn 以免造成不必要的紅字恐慌
                console.warn(`獲取 ${item.symbol} 失敗:`, error.message || error);
                
                // 取得目前時間戳
                const now = new Date();
                const updateTime = now.toLocaleString('zh-TW', { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });
                
                return {
                    ...item,
                    price: 'N/A',
                    kVal: 'N/A',
                    kdCross: 'N/A',
                    location: 'N/A',
                    advice: '請你自行查詢',
                    remark: '網路或伺服器阻擋',
                    updateTime: updateTime,
                    status: 'error'
                };
            }
        }

        function getYahooLink(symbol) {
            const encodeSym = symbol === '^TWII' ? '%5ETWII' : symbol;
            return `https://tw.stock.yahoo.com/quote/${encodeSym}/technical-analysis`;
        }

        function renderRow(row) {
            let isBuy = row.advice.includes('買');
            let isSell = row.advice.includes('賣');
            
            // 整列樣式處理
            let rowClass = "hover:bg-gray-100 transition border-b border-gray-200 ";
            let adviceOutput = `○ ${row.advice}`;

            if (isBuy) {
                rowClass += "font-bold text-gray-900";
                adviceOutput = `🟢 ${row.advice}`;
            } else if (isSell) {
                rowClass += "font-bold text-gray-900";
                adviceOutput = `🔴 ${row.advice}`;
            } else {
                rowClass += "text-gray-600";
            }

            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.id = `row-${row.symbol}`;

            tr.innerHTML = `
                <td class="px-4 py-3">${row.category}</td>
                <td class="px-4 py-3">
                    <a href="${getYahooLink(row.symbol)}" target="_blank" class="text-blue-600 hover:text-blue-800 hover:underline">
                        ${row.name}
                    </a>
                </td>
                <td class="px-4 py-3">${row.symbol}</td>
                <td class="px-4 py-3">${row.price}</td>
                <td class="px-4 py-3">${row.kVal}</td>
                <td class="px-4 py-3">${row.kdCross}</td>
                <td class="px-4 py-3">${row.location}</td>
                <td class="px-4 py-3">${adviceOutput}</td>
                <td class="px-4 py-3 text-gray-400 font-normal text-xs">${row.remark}</td>
                <td class="px-4 py-3 text-gray-400 font-normal text-xs">${row.updateTime}</td>
            `;
            return tr;
        }

        async function loadData() {
            const tableBody = document.getElementById('dataTable');
            
            // 清空表格，預先為每個stock建立佔位符
            tableBody.innerHTML = '';
            
            // 建立佔位符行的映射
            const placeholders = {};
            targets.forEach((target) => {
                const tr = document.createElement('tr');
                tr.id = `row-${target.symbol}`;
                tr.className = 'opacity-50';
                tr.innerHTML = `
                    <td colspan="10" class="px-6 py-3 text-center text-gray-400 text-sm">
                        <div class="flex items-center justify-center gap-1">
                            <div class="loader ease-linear rounded-full border-2 border-t-2 border-gray-300 h-4 w-4"></div>
                            <span>載入中...</span>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
                placeholders[target.symbol] = tr;
            });

            let loadedCount = 0;
            const totalCount = targets.length;

            // 並行取得所有股票資料
            const promises = targets.map(async (target) => {
                const res = await fetchStockData(target);
                loadedCount++;
                
                // 用新內容替換對應的佔位符行
                const newTr = renderRow(res);
                const oldTr = placeholders[target.symbol];
                oldTr.replaceWith(newTr);
                
                // 如果還有其他筆在抓取，更新或新增進度提示
                if (loadedCount < totalCount) {
                    // 移除舊的進度提示（如果存在）
                    const oldStatus = document.getElementById('loadingStatus');
                    if (oldStatus) {
                        oldStatus.remove();
                    }
                    
                    // 新增進度提示
                    const statusRow = document.createElement('tr');
                    statusRow.id = 'loadingStatus';
                    statusRow.className = 'bg-blue-50 border-b border-gray-200';
                    statusRow.innerHTML = `
                        <td colspan="10" class="px-6 py-4 text-center text-gray-600">
                            <div class="flex flex-col items-center justify-center">
                                <div class="flex items-center gap-2">
                                    <div class="loader ease-linear rounded-full border-2 border-t-2 border-blue-400 h-5 w-5"></div>
                                    <p class="text-sm font-medium">已取得 <span class="text-blue-600 font-bold">${loadedCount}</span> 筆，尚餘 <span class="text-orange-600 font-bold">${totalCount - loadedCount}</span> 筆</p>
                                </div>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(statusRow);
                } else {
                    // 全部完成，移除進度提示
                    const statusRow = document.getElementById('loadingStatus');
                    if (statusRow) {
                        statusRow.remove();
                    }
                }
                
                return res;
            });

            await Promise.all(promises);
        }

        window.onload = loadData;

        // ============================================================
        // 自動推導輔助
        // ============================================================
        const CATEGORY_STEP_MAP = {
            '台灣市值型 ETF': 1,
            '國際市值型 ETF': 2,
            '美債券 ETF': 3,
            '短線操作（個股）': 4,
        };

        function deriveStep(category) {
            return CATEGORY_STEP_MAP[category] || 4;
        }

        function deriveApiSymbol(symbol) {
            return symbol.startsWith('^') ? symbol : `${symbol}.TW`;
        }

        // ============================================================
        // 設定 Modal 功能
        // ============================================================
        let editingSymbol = null;

        function openSettings() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = 'flex';
            renderSettingsList();
        }

        function closeSettings() {
            document.getElementById('settingsModal').style.display = 'none';
            cancelEdit();
        }

        function renderSettingsList() {
            const list = document.getElementById('settingsList');
            if (targets.length === 0) {
                list.innerHTML = '<p class="text-sm text-gray-400 py-4 text-center">尚無任何標的，請新增</p>';
                return;
            }
            list.innerHTML = targets.map((t, idx) => `
                <div class="flex items-center justify-between py-2.5 gap-2">
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full whitespace-nowrap">${escapeHtml(t.category)}</span>
                        <span class="text-sm font-medium text-gray-800 truncate">${escapeHtml(t.name)}</span>
                        <span class="text-xs text-gray-400 font-mono">${escapeHtml(t.symbol)}</span>
                    </div>
                    <div class="flex gap-1 shrink-0">
                        <button data-sym="${escapeAttr(t.symbol)}" onclick="editTarget(this.dataset.sym)"
                            class="text-xs text-blue-500 hover:text-blue-700 px-2 py-1 rounded hover:bg-blue-50 transition">✏ 編輯</button>
                        <button data-sym="${escapeAttr(t.symbol)}" onclick="deleteTarget(this.dataset.sym)"
                            class="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition">🗑 刪除</button>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function escapeAttr(str) {
            return String(str).replace(/"/g, '&quot;');
        }

        function editTarget(symbol) {
            const target = targets.find(t => t.symbol === symbol);
            if (!target) return;
            editingSymbol = symbol;
            document.getElementById('inputSymbol').value = target.symbol;
            document.getElementById('inputName').value = target.name;
            document.getElementById('inputCategory').value = target.category;
            document.getElementById('formTitle').textContent = `✏ 編輯：${target.name}`;
            document.getElementById('submitBtn').textContent = '更新';
            document.getElementById('cancelEditBtn').style.display = '';
            document.getElementById('formError').style.display = 'none';
            document.getElementById('inputSymbol').focus();
        }

        function cancelEdit() {
            editingSymbol = null;
            document.getElementById('inputSymbol').value = '';
            document.getElementById('inputName').value = '';
            document.getElementById('inputCategory').value = '台灣市值型 ETF';
            document.getElementById('formTitle').textContent = '新增股票標的';
            document.getElementById('submitBtn').textContent = '新增';
            document.getElementById('cancelEditBtn').style.display = 'none';
            document.getElementById('formError').style.display = 'none';
        }

        function deleteTarget(symbol) {
            targets = targets.filter(t => t.symbol !== symbol);
            renderSettingsList();
        }

        function submitTargetForm() {
            const symbol = document.getElementById('inputSymbol').value.trim().toUpperCase();
            const name = document.getElementById('inputName').value.trim();
            const category = document.getElementById('inputCategory').value;
            const errEl = document.getElementById('formError');

            if (!symbol || !name) {
                errEl.textContent = '請填寫代號與名稱';
                errEl.style.display = '';
                return;
            }

            // 新增模式：檢查重複代號
            if (!editingSymbol && targets.some(t => t.symbol === symbol)) {
                errEl.textContent = `代號「${symbol}」已存在，請勿重複新增`;
                errEl.style.display = '';
                return;
            }

            const newTarget = {
                category,
                name,
                symbol,
                apiSymbol: deriveApiSymbol(symbol),
                step: deriveStep(category),
            };

            if (editingSymbol) {
                const idx = targets.findIndex(t => t.symbol === editingSymbol);
                if (idx !== -1) targets[idx] = newTarget;
            } else {
                targets.push(newTarget);
            }

            cancelEdit();
            renderSettingsList();
            errEl.style.display = 'none';
        }

        function saveSettings() {
            saveTargets();
            closeSettings();
            loadData();
        }

        // ============================================================
        // 匯出 / 匯入 JSON 備份
        // ============================================================
        function exportTargets() {
            const json = JSON.stringify(targets, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stock-targets.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importTargets(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!Array.isArray(data) || data.length === 0) throw new Error('格式不正確，需為非空陣列');
                    for (const item of data) {
                        if (!item.symbol || !item.name || !item.category) throw new Error('缺少必要欄位（symbol、name、category）');
                        // 相容舊版匯出（補齊自動推導欄位）
                        if (!item.step) item.step = deriveStep(item.category);
                        if (!item.apiSymbol) item.apiSymbol = deriveApiSymbol(item.symbol);
                    }
                    targets = data;
                    saveTargets();
                    renderSettingsList();
                    alert(`✅ 匯入成功，共載入 ${data.length} 筆標的`);
                } catch (err) {
                    alert(`❌ 匯入失敗：${err.message}`);
                }
                // 重設 input，讓同一檔案可再次觸發 onchange
                event.target.value = '';
            };
            reader.readAsText(file);
        }
</body>
</html>
