<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <title>每日投資檢查</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

    <!-- ════════ Header ════════ -->
    <header class="site-header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="header-brand-icon">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                        <polyline points="16 7 22 7 22 13"/>
                    </svg>
                </div>
                <span class="header-title">每日投資檢查</span>
                <span id="lastUpdateBadge" style="display:none;"></span>
            </div>
            <div style="display:flex;gap:7px;align-items:center;">
                <button id="refreshBtn" class="btn btn-ghost" onclick="loadData(true)" aria-label="重新整理">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    <span class="btn-label">重新整理</span>
                </button>
                <button class="btn btn-ghost" onclick="openSettings()" aria-label="管理標的">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    <span class="btn-label">管理標的</span>
                </button>
            </div>
        </div>
    </header>

    <!-- ════════ Main ════════ -->
    <main class="main-inner">

        <!-- Loading progress bar -->
        <div id="loadingProgress" class="prog-wrap" style="display:none;">
            <div class="prog-meta">
                <span id="progLabel" class="prog-label"></span>
                <span id="progPct" class="prog-pct"></span>
            </div>
            <div class="prog-track">
                <div id="progBar" class="prog-fill" style="width:0%"></div>
            </div>
        </div>

        <div class="data-card">
            <div class="table-scroll">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>標的名稱</th>
                            <th>代號</th>
                            <th>股價</th>
                            <th>K 值</th>
                            <th>KD 狀態</th>
                            <th>位置</th>
                            <th>操作建議</th>
                            <th>更新時間</th>
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr>
                            <td colspan="8" style="text-align:center;padding:52px 0;">
                                <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
                                    <div class="spinner spinner-lg"></div>
                                    <span style="color:var(--text-secondary);font-size:12.5px;">正在取得最新行情並計算 KD 值…</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="footer-note">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            數據來源：Yahoo Finance API。KD 採 9 日計算參數，KD 狀態採最近交叉 + 目前 K/D 位置判斷。
        </div>
    </main>

    <!-- ════════ Settings Modal ════════ -->
    <div id="settingsModal" class="modal-overlay" style="display:none;">
        <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">

            <div class="modal-head">
                <h2 id="settingsModalTitle">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    管理股票標的
                </h2>
                <button class="modal-close" onclick="closeSettings()" aria-label="關閉">✕</button>
            </div>

            <div class="modal-body">
                <div id="settingsList"></div>
            </div>

            <!-- 新增 / 編輯表單 -->
            <div class="modal-form">
                <span id="formTitle" class="modal-form-label">新增標的</span>
                <div class="modal-form-row">
                    <div class="field-group">
                        <label class="field-label" for="inputSymbol">代號</label>
                        <input id="inputSymbol" type="text" placeholder="如 0050 或 ^TWII"
                            class="form-inp" style="width:140px;"
                            name="symbol" autocomplete="off" spellcheck="false"
                            onkeydown="if(event.key==='Enter')submitTargetForm()" />
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="inputName">名稱</label>
                        <input id="inputName" type="text" placeholder="如 元大台灣50"
                            class="form-inp" style="width:155px;"
                            name="name" autocomplete="off"
                            onkeydown="if(event.key==='Enter')submitTargetForm()" />
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="inputCategory">類別</label>
                        <select id="inputCategory" class="form-sel" name="category">
                            <option value="台灣市值型 ETF">台灣市值型 ETF</option>
                            <option value="國際市值型 ETF">國際市值型 ETF</option>
                            <option value="美債券 ETF">美債券 ETF</option>
                            <option value="短線操作（個股）">短線操作（個股）</option>
                        </select>
                    </div>
                    <button id="submitBtn" class="btn btn-primary" onclick="submitTargetForm()">新增</button>
                    <button id="cancelEditBtn" class="btn btn-ghost" onclick="cancelEdit()" style="display:none;">取消</button>
                </div>
                <p id="formError" class="form-err" style="display:none;"></p>
            </div>

            <div class="modal-footer">
                <div style="display:flex;gap:7px;">
                    <button class="btn btn-success" onclick="exportTargets()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        匯出備份
                    </button>
                    <label class="btn btn-warning">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        匯入備份
                        <input id="importFileInput" type="file" accept=".json" style="display:none;" onchange="importTargets(event)" />
                    </label>
                </div>
                <button class="btn btn-primary" onclick="saveSettings()" style="padding:7px 20px;">儲存並關閉</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
